<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <title>404 - Systeemfout</title>

  <style>
    body {
      margin: 0;
      background: #050505;
      color: #ff2b2b;
      font-family: Consolas, monospace;
      overflow: hidden;
      animation: flikker 0.15s infinite;
    }

    @keyframes flikker {
      0% { background: #050505; }
      50% { background: #220000; }
      100% { background: #050505; }
    }

    .container {
      padding: 30px;
      position: relative;
      z-index: 2;
    }

    h1 {
      font-size: 70px;
      margin: 0;
      text-shadow: 0 0 20px red;
    }

    .warning {
      font-size: 26px;
      color: yellow;
      margin-top: 20px;
      text-shadow: 0 0 12px yellow;
    }

    .box {
      border: 2px solid red;
      padding: 15px;
      margin-top: 20px;
      background: rgba(255, 0, 0, 0.12);
      box-shadow: 0 0 25px red;
      font-size: 18px;
    }

    .glitch {
      position: absolute;
      font-size: 18px;
      opacity: 0.75;
      pointer-events: none;
      animation: beweeg 1s infinite linear;
      z-index: 1;
    }

    @keyframes beweeg {
      from { transform: translateY(100vh); }
      to { transform: translateY(-120vh); }
    }

    .monster {
      position: absolute;
      font-size: 42px;
      z-index: 3;
      animation: lopen 4s linear infinite;
    }

    @keyframes lopen {
      from {
        left: -80px;
        transform: scaleX(1);
      }
      to {
        left: 110vw;
        transform: scaleX(1);
      }
    }

    .monster:nth-child(1) { top: 70%; animation-duration: 3s; }
    .monster:nth-child(2) { top: 80%; animation-duration: 5s; animation-delay: 0.5s; }
    .monster:nth-child(3) { top: 60%; animation-duration: 4s; animation-delay: 1s; }
    .monster:nth-child(4) { top: 88%; animation-duration: 6s; animation-delay: 1.5s; }
  </style>
</head>

<body>

  <div class="container">
    <h1>404 ERROR</h1>

    <div class="warning">
      ⚠ ONVEILIGE SITE GEDETECTEERD ⚠
    </div>

    <div class="box">
      SYSTEM FAILURE<br>
      ACCESS DENIED<br>
      ERROR 404: PAGE NOT FOUND<br>
      SECURITY WARNING<br>
      CONNECTION UNTRUSTED<br>
      DATA STREAM CORRUPTED<br>
      FIREWALL BREACH DETECTED<br>
      PAGE RECOVERY STARTED...
    </div>

    <div class="box">
      Automatisch herstellen...
    </div>
  </div>

  <div class="monster">👾</div>
  <div class="monster">👹</div>
  <div class="monster">🧟</div>
  <div class="monster">👻</div>

  <script>
    const doelPagina = "https://teraa-canvas.instructure.com/courses/677/pages/welkom-bij-ict-2";
    const wachttijd = 2000;

    const meldingen = [
      "404 NOT FOUND",
      "UNSAFE CONNECTION",
      "CERTIFICATE ERROR",
      "SYSTEM CRASH",
      "ACCESS DENIED",
      "WARNING",
      "ERROR",
      "SECURITY ALERT",
      "FIREWALL ALERT",
      "RECOVERY MODE"
    ];

    for (let i = 0; i < 45; i++) {
      const tekst = document.createElement("div");
      tekst.className = "glitch";
      tekst.innerText = meldingen[Math.floor(Math.random() * meldingen.length)];
      tekst.style.left = Math.random() * 100 + "vw";
      tekst.style.top = Math.random() * 100 + "vh";
      tekst.style.animationDelay = Math.random() * 2 + "s";
      document.body.appendChild(tekst);
    }

    setTimeout(() => {
      window.top.location.href = doelPagina;
    }, wachttijd);
  </script>

</body>
</html>
