<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <title>404 - Systeemfout</title>

  <style>
    body {
      margin: 0;
      background: #050505;
      color: #ff2b2b;
      font-family: Consolas, monospace;
      overflow: hidden;
      animation: flikker 0.15s infinite;
    }

    @keyframes flikker {
      0% { background: #050505; }
      50% { background: #120000; }
      100% { background: #050505; }
    }

    .container {
      padding: 30px;
    }

    h1 {
      font-size: 70px;
      margin: 0;
      text-shadow: 0 0 20px red;
    }

    .warning {
      font-size: 26px;
      color: yellow;
      margin-top: 20px;
      text-shadow: 0 0 10px yellow;
    }

    .box {
      border: 2px solid red;
      padding: 15px;
      margin-top: 20px;
      background: rgba(255, 0, 0, 0.1);
      box-shadow: 0 0 25px red;
      font-size: 18px;
    }

    .glitch {
      position: absolute;
      font-size: 18px;
      opacity: 0.7;
      animation: beweeg 1s infinite linear;
      pointer-events: none;
    }

    @keyframes beweeg {
      from { transform: translateY(100vh); }
      to { transform: translateY(-100vh); }
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>404 ERROR</h1>

    <div class="warning">
      ⚠ ONVEILIGE SITE GEDETECTEERD ⚠
    </div>

    <div class="box">
      SYSTEM FAILURE<br>
      ACCESS DENIED<br>
      ERROR 404: PAGE NOT FOUND<br>
      SECURITY WARNING<br>
      CONNECTION UNTRUSTED<br>
      DATA STREAM CORRUPTED<br>
      FIREWALL BREACH DETECTED<br>
      PAGE RECOVERY STARTED...
    </div>

    <div class="box">
      Automatisch herstellen... moment geduld.
    </div>
  </div>

  <script>
    const doelPagina = "https://teraa-canvas.instructure.com/courses/677/pages/welkom-bij-ict-2";
    const wachttijd = 2000;

    const meldingen = [
      "404 NOT FOUND",
      "UNSAFE CONNECTION",
      "CERTIFICATE ERROR",
      "SYSTEM CRASH",
      "ACCESS DENIED",
      "WARNING",
      "ERROR",
      "SECURITY ALERT",
      "LOADING RECOVERY",
      "FIREWALL ALERT"
    ];

    for (let i = 0; i < 40; i++) {
      const tekst = document.createElement("div");
      tekst.className = "glitch";
      tekst.innerText = meldingen[Math.floor(Math.random() * meldingen.length)];
      tekst.style.left = Math.random() * 100 + "vw";
      tekst.style.top = Math.random() * 100 + "vh";
      tekst.style.animationDelay = Math.random() * 2 + "s";
      document.body.appendChild(tekst);
    }

    setTimeout(() => {
      window.location.href = doelPagina;
    }, wachttijd);
  </script>

</body>
</html>
